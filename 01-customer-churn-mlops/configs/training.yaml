data:
  path: "data/raw.csv"
  test_size: 0.2
  random_state: 42

features:
  categorical:
    - gender
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod
  numerical:
    - SeniorCitizen
    - tenure
    - MonthlyCharges
    - TotalCharges
  target: Churn

catboost:
  n_trials: 30
  cv_folds: 5
  iterations: [100, 500]
  depth: [4, 8]
  learning_rate: [0.01, 0.3]
  l2_leaf_reg: [0.001, 10.0]
  auto_class_weights: Balanced

lightgbm:
  n_trials: 30
  cv_folds: 5
  n_estimators: [100, 500]
  max_depth: [3, 8]
  learning_rate: [0.01, 0.3]
  num_leaves: [15, 63]
  class_weight: balanced

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "artifacts/model.pkl"

dashboard:
  host: "0.0.0.0"
  port: 8501
