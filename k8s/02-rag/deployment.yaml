apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: ds-projects
  labels:
    app: rag-api
    project: "02-rag-enterprise"
    version: "1.0.0"
spec:
  # RAG is stateless — ChromaDB is remote; 2 replicas for HA
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
        project: "02-rag-enterprise"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rag-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: rag-api
          image: ds-projects/rag-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7860
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: LOG_LEVEL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ds-projects-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              # LangChain + ChromaDB embedding lookups are memory-bound
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "800m"
              memory: "1500Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
