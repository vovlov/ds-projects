apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: ds-projects
  labels:
    app: recsys-api
    version: "1.0"
    project: "09-recsys-feature-store"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: recsys-api
          image: ds-projects/recsys-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api-key
                  optional: true
            - name: LOG_LEVEL
              value: "INFO"
            - name: FEATURE_STORE_PATH
              value: "/app/artifacts/feature_store.db"
          resources:
            requests:
              cpu: "500m"
              # Two-tower embeddings + Feast SQLite online store
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: recsys-artifacts
              mountPath: /app/artifacts
      volumes:
        - name: recsys-artifacts
          emptyDir: {}
      terminationGracePeriodSeconds: 30
