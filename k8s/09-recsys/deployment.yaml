apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  namespace: ds-projects
  labels:
    app: recsys-api
    project: "09-recsys-feature-store"
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
        project: "09-recsys-feature-store"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: recsys-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: recsys-api
          image: ds-projects/recsys-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: LOG_LEVEL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ds-projects-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              # Two-tower inference is numpy-only; low baseline
              cpu: "200m"
              memory: "512Mi"
            limits:
              # LLM re-ranking pass can spike memory temporarily
              cpu: "1000m"
              memory: "1500Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
