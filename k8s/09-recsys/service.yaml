apiVersion: v1
kind: Service
metadata:
  name: recsys-api
  namespace: ds-projects
  labels:
    app: recsys-api
spec:
  selector:
    app: recsys-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: recsys-api
  namespace: ds-projects
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: recsys-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: recsys-api
  namespace: ds-projects
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: recsys-api
