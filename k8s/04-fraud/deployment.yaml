apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  namespace: ds-projects
  labels:
    app: fraud-api
    version: "1.0"
    project: "04-graph-fraud-detection"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: fraud-api
          image: ds-projects/fraud-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: ELLIPTIC_DATA_PATH
              value: "/data/elliptic"
          resources:
            requests:
              cpu: "500m"
              # GNN inference + graph construction requires extra memory
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: fraud-data
              mountPath: /data
      volumes:
        - name: fraud-data
          emptyDir: {}
      terminationGracePeriodSeconds: 30
