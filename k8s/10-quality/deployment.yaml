apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-api
  namespace: ds-projects
  labels:
    app: quality-api
    version: "1.0"
    project: "10-data-quality-platform"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quality-api
  template:
    metadata:
      labels:
        app: quality-api
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: quality-api
          image: ds-projects/quality-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: quality-alerts-secret
                  key: webhook-url
                  optional: true
            - name: DRIFT_PSI_THRESHOLD
              value: "0.2"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
