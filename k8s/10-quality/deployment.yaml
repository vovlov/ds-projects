apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-api
  namespace: ds-projects
  labels:
    app: quality-api
    project: "10-data-quality-platform"
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quality-api
  template:
    metadata:
      labels:
        app: quality-api
        project: "10-data-quality-platform"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: quality-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: quality-api
          image: ds-projects/quality-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "600m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 20
