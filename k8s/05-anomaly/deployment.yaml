apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-api
  namespace: ds-projects
  labels:
    app: anomaly-api
    version: "1.0"
    project: "05-realtime-anomaly"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-api
  template:
    metadata:
      labels:
        app: anomaly-api
        version: "1.0"
      annotations:
        # Prometheus scraping for /metrics endpoint
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: anomaly-api
          image: ds-projects/anomaly-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: WINDOW_SIZE
              value: "100"
            - name: ANOMALY_THRESHOLD
              value: "3.0"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 15
