apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-api
  namespace: ds-projects
  labels:
    app: anomaly-api
    project: "05-realtime-anomaly"
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-api
  template:
    metadata:
      labels:
        app: anomaly-api
        project: "05-realtime-anomaly"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: anomaly-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: anomaly-api
          image: ds-projects/anomaly-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: LOG_LEVEL
            - name: PROMETHEUS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: PROMETHEUS_ENABLED
          resources:
            requests:
              # LSTM + MMD are numpy-only — low CPU footprint at inference
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 20
