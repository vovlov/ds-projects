apiVersion: v1
kind: Service
metadata:
  name: anomaly-api
  namespace: ds-projects
  labels:
    app: anomaly-api
spec:
  selector:
    app: anomaly-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: anomaly-api
  namespace: ds-projects
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: anomaly-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # SRE workload has bursty peaks; scale aggressively at 60%
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 3
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: anomaly-api
  namespace: ds-projects
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: anomaly-api
