apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-api
  namespace: ds-projects
  labels:
    app: pricing-api
    version: "1.0"
    project: "07-realestate-pricing"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing-api
  template:
    metadata:
      labels:
        app: pricing-api
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: pricing-api
          image: ds-projects/pricing-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "250m"
              # CatBoost model + SHAP values fit in 512MB
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/artifacts
      volumes:
        - name: model-artifacts
          emptyDir: {}
      terminationGracePeriodSeconds: 30
