apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ner-api-hpa
  namespace: ds-projects
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ner-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # NER inference is CPU-bound; scale aggressively
          averageUtilization: 65
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
