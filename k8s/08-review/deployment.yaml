apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-api
  namespace: ds-projects
  labels:
    app: review-api
    version: "1.0"
    project: "08-llm-code-review"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-api
  template:
    metadata:
      labels:
        app: review-api
        version: "1.0"
    spec:
      containers:
        - name: review-api
          image: ds-projects/review-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-secret
                  key: api-key
                  optional: true
            - name: LOG_LEVEL
              value: "INFO"
            - name: MAX_CODE_LENGTH
              value: "10000"
          resources:
            requests:
              cpu: "250m"
              # LLM calls are I/O-bound; low CPU/memory for the orchestrator
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 60
