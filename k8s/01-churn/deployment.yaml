apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-api
  namespace: ds-projects
  labels:
    app: churn-api
    project: "01-customer-churn-mlops"
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-api
  template:
    metadata:
      labels:
        app: churn-api
        project: "01-customer-churn-mlops"
      annotations:
        # Prometheus auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Spread replicas across nodes to survive single-node failure
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: churn-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: churn-api
          image: ds-projects/churn-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: LOG_LEVEL
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: ds-projects-config
                  key: MLFLOW_TRACKING_URI
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ds-projects-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              # CatBoost inference spikes — cap at 1 CPU to avoid noisy-neighbour
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            # CatBoost model load can take up to 60 s on first start
            failureThreshold: 12
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
